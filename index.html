<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>微信转账系统 - 登录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", Helvetica, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-box {
  background: #fff;
  border-radius: 16px;
  padding: 40px 32px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
  border-radius: 16px;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}
.logo h1 {
  font-size: 22px;
  color: #1f1f1f;
  font-weight: 600;
}
.logo p {
  font-size: 13px;
  color: #888;
  margin-top: 4px;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 14px;
  color: #666;
  margin-bottom: 8px;
}
.form-group input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #e5e5e5;
  border-radius: 10px;
  font-size: 15px;
  transition: border-color 0.2s;
}
.form-group input:focus {
  outline: none;
  border-color: #07c160;
}
.btn-login {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 12px rgba(7,193,96,0.3);
}
.btn-login:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(7,193,96,0.4);
}
.btn-login:active {
  transform: translateY(0);
}
.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
.msg {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  color: #d4380d;
  min-height: 20px;
}
.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">¥</div>
    <h1>微信转账系统</h1>
    <p>登录以继续</p>
  </div>
  
  <form id="loginForm">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="btnLogin">登录</button>
  </form>
  
  <div class="msg" id="msg"></div>
  <div class="footer">微信转账模拟系统 v2.0</div>
</div>

<script src="common.js"></script>
<script>
var form = document.getElementById('loginForm');
var btn = document.getElementById('btnLogin');
var msg = document.getElementById('msg');

form.onsubmit = function(e) {
  e.preventDefault();
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  
  if (!username || !password) {
    msg.textContent = '请输入用户名和密码';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = '登录中...';
  msg.textContent = '';
  
  WT.api('login', { username: username, password: password }, function(res) {
    btn.disabled = false;
    btn.textContent = '登录';
    
    if (!res.ok) {
      msg.textContent = res.error || '登录失败';
      return;
    }
    
    // 保存用户信息到 localStorage
    localStorage.setItem('wxtransfer_user', JSON.stringify(res.user));
    
    // 跳转到主页
    location.href = 'admin.html';
  });
  
  // 处理网络错误
  setTimeout(function() {
    if (btn.disabled) {
      btn.disabled = false;
      btn.textContent = '登录';
      msg.textContent = '网络连接失败，请检查PHP服务';
    }
  }, 10000);
};
</script>
</body>
</html>
