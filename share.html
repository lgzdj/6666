<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>微信</title>
<meta name="format-detection" content="telephone=no">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", Helvetica, sans-serif;
    background: #ededed;
    color: #1f1f1f;
  }
  .chat {
    min-height: 100vh;
    padding: 20px 12px 40px;
  }
  .bubble-row { display: flex; justify-content: flex-end; margin-bottom: 14px; }
  .bubble {
    position: relative;
    max-width: 78%;
    background: #95ec69;
    border-radius: 6px;
    padding: 10px 12px 8px;
    margin-right: 10px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
  }
  .bubble::after {
    content: '';
    position: absolute;
    right: -6px; top: 12px;
    width: 0; height: 0;
    border: 6px solid transparent;
    border-left: 6px solid #95ec69;
  }
  .card {
    background: #fff;
    border-radius: 4px;
    padding: 12px 12px 10px;
    min-width: 230px;
    cursor: pointer;
  }
  .card .amount {
    font-size: 22px; font-weight: 600; color: #1f1f1f; line-height: 1.3;
  }
  .card .desc {
    font-size: 13px; color: #666; margin-top: 4px;
  }
  .card .foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; padding-top: 8px;
    border-top: 1px solid #f0f0f0;
  }
  .card .foot .wxtag {
    font-size: 12px; color: #999;
  }
  .card .foot .icon {
    width: 28px; height: 28px;
    background: #f2a73c; color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold;
  }
  .time-label {
    text-align: right;
    font-size: 11px; color: #999;
    margin-bottom: 4px;
    padding-right: 14px;
  }
  .loading, .error {
    text-align: center; padding: 40px 20px; color: #999; font-size: 13px;
  }
  .err { color: #d4380d; }
</style>
</head>
<body>
<div class="chat" id="chat">
  <div class="loading">加载中...</div>
</div>

<script src="common.js"></script>
<script>
  var id = WT.qs('id');
  if (!id) {
    document.getElementById('chat').innerHTML = '<div class="error err">缺少参数 id</div>';
  } else {
    WT.api('get', { id: id }, function(res){
      var chat = document.getElementById('chat');
      if (!res.ok) { chat.innerHTML = '<div class="error err">加载失败：' + (res.error || '') + '</div>'; return; }
      var it = res.item;
      chat.innerHTML =
        '<div class="time-label">' + (it.time || '').substring(0, 16) + '</div>'
       +'<div class="bubble-row">'
       +'  <div class="bubble">'
       +'    <div class="card" id="go">'
       +'      <div class="amount">' + (it.title || '') + '</div>'
       +'      <div class="desc">' + (it.description || '') + '</div>'
       +'      <div class="foot">'
       +'        <span class="wxtag">微信</span>'
       +'        <span class="icon">¥</span>'
       +'      </div>'
       +'    </div>'
       +'  </div>'
       +'</div>';
      document.getElementById('go').onclick = function(){
        location.href = 'transfer.html?id=' + id;
      };
    });
  }
</script>
</body>
</html>
