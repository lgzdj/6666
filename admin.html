<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>转账列表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f3f3f3;
    min-height: 100vh;
    color: #333;
  }
  .bar {
    background: #fff;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #eee;
    position: sticky; top: 0; z-index: 10;
  }
  .bar h1 { font-size: 17px; color: #1f1f1f; }
  .bar .r { font-size: 12px; color: #666; }
  .bar .r a { color: #07c160; text-decoration: none; margin-left: 10px; }
  .add-row { padding: 14px 16px 8px; }
  .btn {
    display: inline-block; padding: 11px 18px;
    background: #07c160; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; text-decoration: none;
    box-shadow: 0 4px 10px rgba(7,193,96,0.25);
  }
  .btn.alt { background: #f0f0f0; color: #333; box-shadow: none; }
  .list { padding: 0 16px 60px; }
  .item {
    background: #fff; border-radius: 12px;
    padding: 14px; margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  .item .title { font-size: 17px; font-weight: 600; color: #1f1f1f; }
  .item .desc { font-size: 13px; color: #666; margin-top: 4px; }
  .item .time { font-size: 12px; color: #999; margin-top: 6px; }
  .tag {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; margin-left: 6px;
  }
  .tag.pending { background: #fff7e6; color: #d48806; }
  .tag.done { background: #f6ffed; color: #389e0d; }
  .ops { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .op {
    flex: 1; text-align: center; padding: 8px;
    background: #f5f5f5; color: #333;
    border-radius: 6px; font-size: 12px;
    text-decoration: none; cursor: pointer;
    min-width: 60px;
  }
  .op.green { background: #07c160; color: #fff; }
  .op.red { background: #fff1f0; color: #cf1322; }
  .empty {
    text-align: center; padding: 60px 20px;
    color: #999; font-size: 14px;
  }
  .share-box {
    margin-top: 10px; padding: 10px;
    background: #f9f9f9; border-radius: 8px;
    font-size: 11px; word-break: break-all; color: #666;
  }
</style>
</head>
<body>
<div class="bar">
  <h1>💸 转账记录</h1>
  <div class="r"><span id="user"></span><a href="javascript:;" id="logout">退出</a></div>
</div>

<div class="add-row">
  <a href="edit.html" class="btn">＋ 添加转账</a>
</div>

<div class="list" id="list"></div>

<script src="common.js"></script>
<script>
  WT.api('me', {}, function(res){
    if (!res.ok) {
      document.getElementById('list').innerHTML = '<div class="empty">未登录，正在跳转...</div>';
      setTimeout(function(){ location.href = 'index.html'; }, 800);
      return;
    }
    document.getElementById('user').textContent = '👋 ' + (res.user || '') + ' ';
    load();
  });

  document.getElementById('logout').onclick = function(){
    WT.api('logout', {}, function(){ location.href = 'index.html'; });
  };

  function load(){
    var list = document.getElementById('list');
    list.innerHTML = '<div class="empty">加载中...</div>';
    WT.api('list', {}, function(res){
      if (!res.ok) { list.innerHTML = '<div class="empty">' + (res.error || '加载失败') + '</div>'; return; }
      var items = res.items || [];
      if (!items.length) { list.innerHTML = '<div class="empty">暂无记录，点右上角"添加转账"创建</div>'; return; }
      var html = '';
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        var shareUrl = location.origin + location.pathname.replace(/[^\/]+\.html$/, '') + 'share.html?id=' + it.id;
        html += '<div class="item">'
             + '<div class="title">' + (it.title || '')
             + '<span class="tag ' + (it.received ? 'done' : 'pending') + '">'
             + (it.received ? '✓ 已收款' : '⏳ 待收款') + '</span></div>'
             + '<div class="desc">' + (it.description || '') + ' · ' + (it.transfer_type || '') + '</div>'
             + '<div class="time">转账时间：' + (it.time || '') + (it.received && it.received_time ? '　收款时间：' + it.received_time : '') + '</div>'
             + '<div class="ops">'
             + '<a class="op green" href="' + shareUrl + '" target="_blank" data-url="' + shareUrl + '">🔗 复制分享链接</a>'
             + '<a class="op" href="transfer.html?id=' + it.id + '" target="_blank">💳 预览转账页</a>'
             + '<a class="op" href="edit.html?id=' + it.id + '">✏️ 编辑</a>'
             + '<span class="op red" data-id="' + it.id + '">🗑 删除</span>'
             + '</div>'
             + '<div class="share-box">' + shareUrl + '</div>'
             + '</div>';
      }
      list.innerHTML = html;
      list.querySelectorAll('.op.red').forEach(function(el){
        el.onclick = function(){
          if (!confirm('确认删除这条记录？')) return;
          WT.api('delete', { id: el.getAttribute('data-id') }, function(r){
            if (r.ok) load(); else alert(r.error || '删除失败');
          });
        };
      });
      list.querySelectorAll('[data-url]').forEach(function(el){
        el.onclick = function(e){
          e.preventDefault();
          var url = el.getAttribute('data-url');
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(function(){
              alert('已复制分享链接：\n' + url);
            }, function(){
              prompt('请手动复制以下链接：', url);
            });
          } else {
            prompt('请手动复制以下链接：', url);
          }
        };
      });
    });
  }
</script>
</body>
</html>
