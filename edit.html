<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>添加/编辑转账</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f3f3f3; min-height: 100vh; color: #333;
  }
  .bar {
    background: #fff; padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #eee;
  }
  .bar h1 { font-size: 17px; color: #1f1f1f; }
  .bar a { color: #07c160; text-decoration: none; font-size: 13px; }
  form { padding: 14px 16px 60px; max-width: 560px; margin: 0 auto; }
  label {
    display: block; font-size: 14px; color: #333;
    margin: 12px 0 6px;
  }
  .hint { font-size: 11px; color: #999; margin-top: 4px; }
  input[type=text] {
    width: 100%; padding: 11px 12px;
    border: 1px solid #ddd; border-radius: 10px;
    font-size: 15px; background: #fff;
    outline: none; -webkit-appearance: none;
  }
  input[type=text]:focus { border-color: #07c160; }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }
  .check {
    margin-top: 16px; padding: 12px; background: #fff;
    border-radius: 10px; border: 1px solid #eee;
    display: flex; align-items: center; gap: 8px;
  }
  .check input { width: 18px; height: 18px; }
  .check label { margin: 0; font-size: 14px; }
  .btn-row { margin-top: 24px; display: flex; gap: 10px; }
  button {
    flex: 1; padding: 13px; background: #07c160; color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; box-shadow: 0 6px 14px rgba(7,193,96,0.25);
  }
  button.alt { background: #f0f0f0; color: #333; box-shadow: none; }
  .msg { margin-top: 12px; text-align: center; font-size: 13px; }
  .msg.ok { color: #07c160; }
  .msg.err { color: #d4380d; }
</style>
</head>
<body>
<div class="bar">
  <h1 id="page-title">＋ 添加转账</h1>
  <a href="admin.html">← 返回列表</a>
</div>

<form id="f" onsubmit="return false;">
  <label>标题（金额） <small style="color:#999;font-weight:normal">例：¥8888.88</small></label>
  <input type="text" id="title" placeholder="例：¥8888.88">

  <label>描述 <small style="color:#999;font-weight:normal">分享卡片上的小字说明</small></label>
  <input type="text" id="description" placeholder="例：微信商家转账" value="微信商家转账">

  <label>转账时间 <small style="color:#999;font-weight:normal">格式 2026-06-15 07:13:30</small></label>
  <input type="text" id="time" placeholder="2026-06-15 07:13:30">

  <div class="row">
    <div>
      <label>转账类型</label>
      <input type="text" id="transfer_type" value="微信商家转账">
    </div>
    <div>
      <label>收款方式</label>
      <input type="text" id="pay_method" value="零钱">
    </div>
  </div>

  <label>转账备注</label>
  <input type="text" id="remark" value="活动奖励">

  <div class="check">
    <input type="checkbox" id="received">
    <label for="received">已收款（打开后直接显示"你已收款"页面）</label>
  </div>

  <label>收款时间 <small style="color:#999;font-weight:normal">勾选"已收款"时使用，可留空（自动取当前时间）</small></label>
  <input type="text" id="received_time" placeholder="留空则自动取当前时间">

  <div class="btn-row">
    <button type="button" class="alt" onclick="location.href='admin.html'">取消</button>
    <button type="button" id="btn">保存</button>
  </div>
  <div class="msg" id="msg"></div>
</form>

<script src="common.js"></script>
<script>
  var id = WT.qs('id');
  if (id) document.getElementById('page-title').textContent = '✏️ 编辑转账';

  // 时间默认值
  if (!document.getElementById('time').value) {
    document.getElementById('time').value = WT.nowLocal();
  }

  if (id) {
    WT.api('get', { id: id }, function(res){
      if (!res.ok) { document.getElementById('msg').textContent = '加载失败：' + res.error; document.getElementById('msg').className='msg err'; return; }
      var it = res.item;
      document.getElementById('title').value = it.title || '';
      document.getElementById('description').value = it.description || '';
      document.getElementById('time').value = it.time || '';
      document.getElementById('transfer_type').value = it.transfer_type || '';
      document.getElementById('pay_method').value = it.pay_method || '';
      document.getElementById('remark').value = it.remark || '';
      document.getElementById('received').checked = !!it.received;
      document.getElementById('received_time').value = it.received_time || '';
    });
  }

  document.getElementById('btn').onclick = function(){
    var receivedTime = document.getElementById('received_time').value.trim();
    var received = document.getElementById('received').checked;
    if (received && !receivedTime) receivedTime = WT.nowLocal();
    var params = {
      title:         document.getElementById('title').value.trim(),
      description:   document.getElementById('description').value.trim(),
      time:          document.getElementById('time').value.trim(),
      transfer_type: document.getElementById('transfer_type').value.trim(),
      pay_method:    document.getElementById('pay_method').value.trim(),
      remark:        document.getElementById('remark').value.trim(),
      received:      received ? '1' : '',
      received_time: receivedTime
    };
    if (!params.title) { alert('请填写标题（金额）'); return; }
    if (!params.time) { alert('请填写转账时间'); return; }

    document.getElementById('msg').textContent = '保存中...';
    document.getElementById('msg').className = 'msg';

    if (id) {
      params.id = id;
      WT.api('update', params, done);
    } else {
      WT.api('add', params, done);
    }
  };

  function done(res){
    if (!res.ok) {
      document.getElementById('msg').textContent = '✗ ' + (res.error || '保存失败');
      document.getElementById('msg').className = 'msg err';
      return;
    }
    document.getElementById('msg').textContent = '✓ 已保存，跳转中...';
    document.getElementById('msg').className = 'msg ok';
    setTimeout(function(){ location.href = 'admin.html'; }, 500);
  }
</script>
</body>
</html>
